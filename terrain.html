        function refreshCalibrationHandles() {
            if (state.mode !== 'editor' || state.editorTab !== 'calibrate') return;
            if (els.handleContainer) els.handleContainer.innerHTML = '';
            state.mapEngine.clearEditorMarkers();
            const showHandles = document.getElementById('calibrationShowHandles').checked;
            if (!showHandles) return;
            const layerId = document.getElementById('calibrationLayerSelect').value;
            const handlesLayer = state.overlayEngine.createCalibrationHandles(layerId);
            if (handlesLayer && els.handleContainer) {
                els.handleContainer.appendChild(handlesLayer);
                handlesLayer.querySelectorAll('.warp-handle-group').forEach(g => {
                    g.addEventListener('pointerdown', onCalibrationHandlePointerDown);
                });
            }
        }

        function onCalibrationHandlePointerDown(e) {
            e.preventDefault();
            e.stopPropagation();
            const handleGroup = e.target.closest('.warp-handle-group');
            if (!handleGroup) return;
            const handleKey = handleGroup.dataset.handleKey;
            const layerId = document.getElementById('calibrationLayerSelect').value;

            // 使用 overlay 容器像素坐标，避免 SVG preserveAspectRatio 带来的转换误差
            const containerRect = els.overlayContainer.getBoundingClientRect();
            const pctStart = {
                x: ((e.clientX - containerRect.left) / containerRect.width) * 100,
                y: ((e.clientY - containerRect.top) / containerRect.height) * 100
            };
            state.calibrationDrag = {
                handleKey,
                layerId,
                lastPoint: pctStart
            };

            function onMove(ev) {
                if (!state.calibrationDrag) return;
                const curContainerRect = els.overlayContainer.getBoundingClientRect();
                const pctCurrent = {
                    x: ((ev.clientX - curContainerRect.left) / curContainerRect.width) * 100,
                    y: ((ev.clientY - curContainerRect.top) / curContainerRect.height) * 100
                };
                const d = state.calibrationDrag;

                if (d.handleKey === 'center') {
                    const dx = pctCurrent.x - d.lastPoint.x;
                    const dy = pctCurrent.y - d.lastPoint.y;
                    state.overlayEngine.updateViewportFromDrag(d.layerId, dx, dy);
                    updateCalibrationSliders();
                } else {
                    const options = {
                        sensitivity: ev.altKey ? 0.18 : (ev.shiftKey ? 1.0 : 0.35)
                    };
                    // 将容器百分比坐标转换为 warp 单位（图层自身尺寸的百分比）
                    const layerData = state.overlayEngine.getCalibrationData()[d.layerId];
                    const ls = Number.isFinite(layerData.scale) ? layerData.scale : 1;
                    const scaledW = layerData.width * ls;
                    const scaledH = layerData.height * ls;
                    const warpLast = {
                        x: d.lastPoint.x * 100 / scaledW,
                        y: d.lastPoint.y * 100 / scaledH
                    };
                    const warpCurrent = {
                        x: pctCurrent.x * 100 / scaledW,
                        y: pctCurrent.y * 100 / scaledH
                    };
                    state.overlayEngine.updateWarpFromDrag(d.layerId, d.handleKey, warpLast, warpCurrent, options);
                    refreshCalibrationHandles();
                }
                d.lastPoint = pctCurrent;
            }

            function onUp(ev) {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
                state.calibrationDrag = null;
                refreshCalibrationHandles();
            }

            document.addEventListener('pointermove', onMove);
            document.addEventListener('pointerup', onUp);
        }

        function bindCalibrationEvents() {
            const layerSelect = document.getElementById('calibrationLayerSelect');
            const xSlider = document.getElementById('calibrationX');
            const ySlider = document.getElementById('calibrationY');
            const wSlider = document.getElementById('calibrationW');
            const hSlider = document.getElementById('calibrationH');
            const opacitySlider = document.getElementById('calibrationOpacity');
            const scaleSlider = document.getElementById('calibrationScale');
            const showHandlesCheckbox = document.getElementById('calibrationShowHandles');
            const resetLayerBtn = document.getElementById('calibrationResetLayerBtn');
            const resetAllBtn = document.getElementById('calibrationResetAllBtn');
            const exportBtn = document.getElementById('calibrationExportBtn');

            function updateSliderValues() {
                document.getElementById('calibrationXVal').textContent = Number(xSlider.value).toFixed(1);
                document.getElementById('calibrationYVal').textContent = Number(ySlider.value).toFixed(1);
                document.getElementById('calibrationWVal').textContent = Number(wSlider.value).toFixed(1);
                document.getElementById('calibrationHVal').textContent = Number(hSlider.value).toFixed(1);
                document.getElementById('calibrationOpacityVal').textContent = Number(opacitySlider.value).toFixed(2);
                document.getElementById('calibrationScaleVal').textContent = Number(scaleSlider.value).toFixed(2);
            }

            function applySliders() {
                const layerId = layerSelect.value;
                state.overlayEngine.setCalibrationData(layerId, 'x', parseFloat(xSlider.value));
                state.overlayEngine.setCalibrationData(layerId, 'y', parseFloat(ySlider.value));
                state.overlayEngine.setCalibrationData(layerId, 'width', parseFloat(wSlider.value));
                state.overlayEngine.setCalibrationData(layerId, 'height', parseFloat(hSlider.value));
                state.overlayEngine.setCalibrationData(layerId, 'opacity', parseFloat(opacitySlider.value));
                state.overlayEngine.setCalibrationData(layerId, 'scale', parseFloat(scaleSlider.value));
                refreshCalibrationHandles();
            }

            // Initialize sliders with current data
            const calData = state.overlayEngine.getCalibrationData();
            const currentLayer = layerSelect.value;
            if (calData[currentLayer]) {
                const d = calData[currentLayer];
                xSlider.value = d.x;
                ySlider.value = d.y;
                wSlider.value = d.width;
                hSlider.value = d.height;
                opacitySlider.value = d.opacity;
                scaleSlider.value = d.scale;
                updateSliderValues();
            }

            [xSlider, ySlider, wSlider, hSlider, opacitySlider, scaleSlider].forEach(slider => {
                slider.addEventListener('input', () => {
                    updateSliderValues();
                    applySliders();
                });
            });

            layerSelect.addEventListener('change', () => {
                const layerId = layerSelect.value;
                const data = state.overlayEngine.getCalibrationData()[layerId];
                if (data) {
                    xSlider.value = data.x;
                    ySlider.value = data.y;
                    wSlider.value = data.width;
                    hSlider.value = data.height;
                    opacitySlider.value = data.opacity;
                    scaleSlider.value = data.scale;
                    updateSliderValues();
                }
                // 校准模式下只展示当前选中的图层
                if (state.editorTab === 'calibrate') {
                    state.overlayEngine.setVisible('mountainBlank', layerId === 'mountainBlank');
                    state.overlayEngine.setVisible('terrainRegion', layerId === 'terrainRegion');
                }
                refreshCalibrationHandles();
            });

            showHandlesCheckbox.addEventListener('change', () => {
                refreshCalibrationHandles();
            });

            resetLayerBtn.addEventListener('click', () => {
                const layerId = layerSelect.value;
                state.overlayEngine.resetLayer(layerId);
                const data = state.overlayEngine.getCalibrationData()[layerId];
                if (data) {
                    xSlider.value = data.x;
                    ySlider.value = data.y;
                    wSlider.value = data.width;
                    hSlider.value = data.height;
                    opacitySlider.value = data.opacity;
                    scaleSlider.value = data.scale;
                    updateSliderValues();
                }
                refreshCalibrationHandles();
            });

            resetAllBtn.addEventListener('click', () => {
                if (!confirm('确定重置所有图层到默认状态吗？')) return;
                state.overlayEngine.resetAll();
                const layerId = layerSelect.value;
                const data = state.overlayEngine.getCalibrationData()[layerId];
                if (data) {
                    xSlider.value = data.x;
                    ySlider.value = data.y;
                    wSlider.value = data.width;
                    hSlider.value = data.height;
                    opacitySlider.value = data.opacity;
                    scaleSlider.value = data.scale;
                    updateSliderValues();
                }
                refreshCalibrationHandles();
            });

            exportBtn.addEventListener('click', () => {
                const content = state.overlayEngine.exportCalibration();
                const blob = new Blob([content], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'overlay-calibration.js';
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
                showToast('校准数据已导出', 'success');
            });
        }
