<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>中国的地形 - 地理教学课件</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body class="map-page">

    <!-- 顶部工具栏：图层开关 -->
    <div class="map-toolbar" id="toolbar">
        <a class="home-link" href="index.html">← 返回首页</a>
        <span class="toolbar-title">中国的地形</span>
        <label class="layer-toggle active" data-layer="base">
            <input type="checkbox" checked> 底图
        </label>
        <label class="layer-toggle" data-layer="mountains" id="layerToggleMountains" style="display:none;">
            <input type="checkbox"> 山脉标记
        </label>
        <label class="layer-toggle" data-layer="regions" id="layerToggleRegions" style="display:none;">
            <input type="checkbox"> 地形区标注
        </label>
        <label class="layer-toggle" data-layer="overlayMountain" id="layerToggleOverlayMountain">
            <input type="checkbox"> 山脉图
        </label>
        <label class="layer-toggle" data-layer="overlayRegion" id="layerToggleOverlayRegion">
            <input type="checkbox"> 地形图
        </label>
        <label class="layer-toggle" data-layer="dropZones">
            <input type="checkbox"> 目标提示
        </label>
        <div class="toolbar-spacer"></div>
        <div class="mode-switch" id="modeSwitch">
            <button class="active" data-mode="single">单人练习</button>
            <button data-mode="pk">双人PK</button>
            <button data-mode="editor" id="editorBtn">坐标采集</button>
        </div>
    </div>

    <!-- 游戏状态栏 -->
    <div class="game-status-bar" id="statusBar">
        <div class="status-item">
            <span class="label">关卡：</span>
            <span class="value" id="levelName">山脉标注</span>
        </div>
        <div class="status-item timer">
            <span class="label">时间：</span>
            <span class="value" id="timerDisplay">00:00</span>
        </div>
        <div class="status-item">
            <span class="label">得分：</span>
            <span class="value" id="scoreDisplay">0</span>
        </div>
        <div class="status-item">
            <span class="label">进度：</span>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
            </div>
        </div>
        <div class="toolbar-spacer"></div>
        <button class="hint-btn" id="hintBtn" title="消耗3分显示一个目标位置">
            💡 提示 (<span id="hintCount">3</span>)
        </button>
        <button class="btn btn-secondary" id="restartBtn" style="padding:6px 14px;font-size:13px;">
            🔄 重开
        </button>

        <!-- PK 模式信息区 -->
        <div class="pk-info" id="pkInfo" style="display:none;align-items:center;gap:12px;margin-left:12px;">
            <div class="pk-player" id="pkP1" style="padding:6px 14px;background:#e8f5e9;border-radius:8px;border:2px solid transparent;transition:border-color 0.3s ease;">
                <span style="font-size:12px;color:#666;">玩家1</span>
                <span id="pkScore1" style="font-size:18px;font-weight:700;color:#2c5f2d;margin-left:8px;">0</span>
            </div>
            <span style="font-size:14px;font-weight:700;color:#999;">VS</span>
            <div class="pk-player" id="pkP2" style="padding:6px 14px;background:#f5f5f5;border-radius:8px;border:2px solid transparent;transition:border-color 0.3s ease;">
                <span style="font-size:12px;color:#666;">玩家2</span>
                <span id="pkScore2" style="font-size:18px;font-weight:700;color:#333;margin-left:8px;">0</span>
            </div>
            <div style="font-size:13px;color:#666;">⏱️ <span id="pkTurnTimer" style="font-weight:700;color:#ff9800;">20</span>秒</div>
        </div>
    </div>

    <!-- 主体区域 -->
    <div class="map-main" id="mapMain">
        <!-- 侧边标签栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>待标注</span>
                <span class="sidebar-count"><span id="remainCount">0</span> / <span id="totalCount">0</span></span>
            </div>
            <div class="label-list" id="labelList"></div>
        </aside>

        <!-- 地图容器 -->
        <div class="map-container" id="mapContainer">
            <img class="base-map-img" id="baseMapImg" src="assets/maps/terrain-base.jpg" alt="底图">
            <div class="overlay-container" id="overlayContainer"></div>
            <div class="handle-container" id="handleContainer"></div>
            <svg class="map-svg" id="mapSvg"></svg>

            <!-- 开始游戏覆盖层 -->
            <div class="game-start-overlay" id="startOverlay">
                <h2 id="startTitle">选择关卡</h2>
                <p id="startDesc">请选择要挑战的关卡类型</p>
                <div class="level-select" id="levelSelect">
                    <button class="level-card active" data-level="mountains" id="levelBtnMountains">
                        <div class="level-card-title">&#x1F3D4; 山脉标注</div>
                        <div class="level-card-desc" id="levelDescMountains">在地图上标注主要山脉</div>
                    </button>
                    <button class="level-card" data-level="terrain-regions" id="levelBtnRegions">
                        <div class="level-card-title">&#x1F5FA; 地形区标注</div>
                        <div class="level-card-desc" id="levelDescRegions">在地图上标注主要地形区</div>
                    </button>
                </div>
                <div style="display:flex;gap:12px;">
                    <button class="btn btn-primary" id="startBtn" style="padding:12px 32px;font-size:16px;">开始挑战</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-content">
            <div class="modal-title" id="resultTitle">挑战完成！</div>
            <div class="result-stars" id="resultStars">
                <span class="result-star">⭐</span>
                <span class="result-star">⭐</span>
                <span class="result-star">⭐</span>
            </div>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="stat-value" id="statScore">0</div>
                    <div class="stat-label">得分</div>
                </div>
                <div class="result-stat">
                    <div class="stat-value" id="statTime">00:00</div>
                    <div class="stat-label">用时</div>
                </div>
                <div class="result-stat">
                    <div class="stat-value" id="statCorrect">0</div>
                    <div class="stat-label">正确数</div>
                </div>
                <div class="result-stat">
                    <div class="stat-value" id="statWrong">0</div>
                    <div class="stat-label">错误数</div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="resultHomeBtn">返回首页</button>
                <button class="btn btn-primary" id="resultRestartBtn">再玩一次</button>
            </div>
        </div>
    </div>

    <!-- 描述弹窗 -->
    <div class="modal-overlay" id="descModal">
        <div class="modal-content" style="max-width:480px;">
            <div class="modal-title" id="descTitle"></div>
            <div class="modal-body" id="descBody"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="descCloseBtn">知道了</button>
            </div>
        </div>
    </div>

    <!-- 编辑模式面板 -->
    <div class="editor-panel" id="editorPanel" style="display:none;">
        <button class="editor-panel-toggle" id="editorPanelToggle" title="收起/展开面板">⬇</button>
        <div class="editor-panel-inner">
        <div class="editor-tabs" id="editorTabs">
            <button class="editor-tab active" data-tab="collect">📝 坐标采集</button>
            <button class="editor-tab" data-tab="calibrate">🔧 图层校准</button>
        </div>
        <div id="editorCollectPanel">
        <h3>
            <span>📝 坐标采集</span>
            <span style="font-size:12px;color:#999;font-weight:400;">点击地图添加</span>
        </h3>
        <div class="editor-form-row">
            <label>采集类型</label>
            <select id="editorType">
                <option value="mountain">山脉（单点）</option>
                <option value="line">线型（连续多点）</option>
                <option value="region-center">地形区中心（单点）</option>
                <option value="region-boundary">地形区边界（连续多点）</option>
            </select>
        </div>
        <div class="editor-form-row">
            <label>目标关卡</label>
            <select id="editorTargetLevel">
                <option value="mountains">山脉标注</option>
                <option value="terrain-regions">地形区标注</option>
            </select>
        </div>
        <div class="editor-form-row">
            <label>名称</label>
            <input type="text" id="editorName" placeholder="如：大兴安岭">
        </div>
        <div class="editor-form-row">
            <label>描述</label>
            <textarea id="editorDesc" placeholder="地理意义描述..."></textarea>
        </div>
        <div class="editor-form-row" id="editorCoordsRow">
            <label>坐标（点击地图自动填充）</label>
            <input type="text" id="editorCoords" readonly placeholder="x, y">
        </div>
        <div class="editor-form-row" id="editorRadiusRow">
            <label>范围半径 (px)</label>
            <input type="number" id="editorRadius" value="50" min="10" max="300" step="5">
        </div>
        <div class="editor-actions">
            <button class="btn btn-primary" id="editorAddBtn">添加</button>
            <button class="btn btn-secondary" id="editorFinishBoundaryBtn" style="display:none;">完成边界</button>
            <button class="btn btn-secondary" id="editorFinishLineBtn" style="display:none;">完成线型</button>
            <button class="btn btn-accent" id="editorTestBtn" title="将当前采集点加载到左侧待标注，测试拖拽落点">加载测试</button>
            <button class="btn btn-secondary" id="editorUndoBtn" title="撤销上一步 (Ctrl+Z)">撤销</button>
            <button class="btn btn-secondary" id="editorClearBtn">清空</button>
            <button class="btn btn-secondary" id="editorExportBtn">导出JSON</button>
        </div>
        <div class="editor-point-list" id="editorList"></div>
        </div>

        <!-- 图层校准子面板 -->
        <div id="editorCalibratePanel" style="display:none;">
            <h3>
                <span>🔧 图层校准</span>
                <span style="font-size:12px;color:#999;font-weight:400;">拖拽对齐参考图</span>
            </h3>
            <div class="editor-form-row">
                <label>校准图层</label>
                <select id="calibrationLayerSelect">
                    <option value="mountainBlank">山脉图</option>
                    <option value="terrainRegion">地形图</option>
                </select>
            </div>
            <div class="editor-form-row calibration-slider-row">
                <label>X 偏移</label>
                <input type="range" id="calibrationX" min="-50" max="50" step="0.1" value="0">
                <span class="calibration-value" id="calibrationXVal">0</span>
            </div>
            <div class="editor-form-row calibration-slider-row">
                <label>Y 偏移</label>
                <input type="range" id="calibrationY" min="-50" max="50" step="0.1" value="0">
                <span class="calibration-value" id="calibrationYVal">0</span>
            </div>
            <div class="editor-form-row calibration-slider-row">
                <label>宽度</label>
                <input type="range" id="calibrationW" min="20" max="200" step="0.1" value="100">
                <span class="calibration-value" id="calibrationWVal">100</span>
            </div>
            <div class="editor-form-row calibration-slider-row">
                <label>高度</label>
                <input type="range" id="calibrationH" min="20" max="200" step="0.1" value="100">
                <span class="calibration-value" id="calibrationHVal">100</span>
            </div>
            <div class="editor-form-row calibration-slider-row">
                <label>透明度</label>
                <input type="range" id="calibrationOpacity" min="0.1" max="1" step="0.05" value="0.8">
                <span class="calibration-value" id="calibrationOpacityVal">0.80</span>
            </div>
            <div class="editor-form-row calibration-slider-row">
                <label>等比缩放</label>
                <input type="range" id="calibrationScale" min="0.1" max="3" step="0.05" value="1">
                <span class="calibration-value" id="calibrationScaleVal">1.00</span>
            </div>
            <div class="editor-form-row">
                <label>
                    <input type="checkbox" id="calibrationShowHandles" checked> 显示控制点
                </label>
            </div>
            <div class="editor-actions">
                <button class="btn btn-secondary" id="calibrationResetLayerBtn">重置当前图层</button>
                <button class="btn btn-secondary" id="calibrationResetAllBtn">恢复默认</button>
                <button class="btn btn-primary" id="calibrationExportBtn">导出校准数据</button>
            </div>
            <div class="calibration-hint" style="margin-top:10px;font-size:12px;color:#666;">
                提示：拖拽画布上的9个控制点进行精细对齐；按住Alt微调，按住Shift快速拖拽。
            </div>
        </div>
        </div>
    </div>

    <script src="data/overlay-calibration.js"></script>
    <script src="data/mountains.js"></script>
    <script src="data/lines.js"></script>
    <script src="data/terrain-regions.js"></script>
    <script src="data/game-config.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/core/svg-map.js"></script>
    <script src="js/core/layers.js"></script>
    <script src="js/core/overlay-engine.js"></script>
    <script>
    // ============================================================
    // 地形模块主逻辑
    // ============================================================

    (function() {
        'use strict';

        // 全局状态
        const state = {
            mode: 'single',       // single | pk | editor
            level: 'mountains',   // mountains | terrain-regions
            isPlaying: false,
            score: 0,
            timer: 0,
            timerInterval: null,
            hintsUsed: 0,
            hintsMax: 3,
            correctCount: 0,
            wrongCount: 0,
            items: [],            // 当前关卡的数据项
            placedIds: new Set(), // 已放置的项
            draggedItem: null,    // 当前拖拽的项
            dragEl: null,         // 拖拽时的浮动元素
            gameConfig: null,
            mapEngine: null,
            layerManager: null,
            // 编辑模式
            editorItems: [],
            editorBoundaryPoints: [],
            editorLinePoints: [],
            editorCurrentType: 'mountain',
            editorEditingIdx: -1,
            editorTab: 'collect',
            calibrationDrag: null,
            undoStack: [],
            // 双人 PK 模式
            pk: {
                active: false,
                currentPlayer: 1,
                scores: [0, 0],
                placedBy: {}, // itemId -> playerNumber
                turnTime: 20,
                turnInterval: null,
                totalTimer: 0,
                totalInterval: null
            }
        };

        // DOM 元素引用
        const els = {
            mapSvg: document.getElementById('mapSvg'),
            mapContainer: document.getElementById('mapContainer'),
            overlayContainer: document.getElementById('overlayContainer'),
            handleContainer: document.getElementById('handleContainer'),
            labelList: document.getElementById('labelList'),
            sidebar: document.getElementById('sidebar'),
            statusBar: document.getElementById('statusBar'),
            startOverlay: document.getElementById('startOverlay'),
            resultModal: document.getElementById('resultModal'),
            descModal: document.getElementById('descModal'),
            editorPanel: document.getElementById('editorPanel'),
            timerDisplay: document.getElementById('timerDisplay'),
            scoreDisplay: document.getElementById('scoreDisplay'),
            progressBar: document.getElementById('progressBar'),
            remainCount: document.getElementById('remainCount'),
            totalCount: document.getElementById('totalCount'),
            levelName: document.getElementById('levelName'),
            hintBtn: document.getElementById('hintBtn'),
            hintCount: document.getElementById('hintCount'),
            startBtn: document.getElementById('startBtn'),
            restartBtn: document.getElementById('restartBtn'),
            modeSwitch: document.getElementById('modeSwitch'),
            toolbar: document.getElementById('toolbar')
        };

        // ============================================================
        // 初始化
        // ============================================================

        function init() {
            // 检测编辑模式
            const urlParams = new URLSearchParams(location.search);
            const isEditor = urlParams.has('editor');

            // 初始化地图引擎
            state.mapEngine = initSvgMap('#mapSvg');
            state.layerManager = createLayerManager(state.mapEngine);
            state.layerManager.bindControls();

            // 初始化叠加图片引擎
            state.overlayEngine = createOverlayEngine({
                container: els.overlayContainer,
                baseWidth: 2981,
                baseHeight: 2180,
                mountainSrc: '地形图片/中国的山脉.jpg',
                regionSrc: '地形图片/中国地形图.jpg',
                onChange: saveOverlayCalibrationToStorage
            });
            loadOverlayCalibration();

            // 同步 overlay 容器尺寸并监听 resize
            // 使用 requestAnimationFrame 确保 SVG 布局完成后再计算
            requestAnimationFrame(() => {
                syncOverlayContainer();
                if (state.overlayEngine) state.overlayEngine.renderOverlays();
            });
            window.addEventListener('resize', () => {
                if (state.mode === 'editor' && state.editorTab === 'calibrate') {
                    setCalibrationCanvas(true);
                } else {
                    syncOverlayContainer();
                    if (state.overlayEngine) state.overlayEngine.renderOverlays();
                }
            });
            // ResizeObserver 监听 map-container 尺寸变化（侧边栏显隐、面板收起等不会触发 window resize）
            if (typeof ResizeObserver !== 'undefined') {
                const _ro = new ResizeObserver(() => {
                    if (state.mode === 'editor' && state.editorTab === 'calibrate') {
                        setCalibrationCanvas(true);
                    } else {
                        syncOverlayContainer();
                        if (state.overlayEngine) state.overlayEngine.renderOverlays();
                    }
                });
                _ro.observe(els.mapContainer);
            }

            // 加载游戏配置（从全局 JS 变量读取，兼容 file:// 协议）
            state.gameConfig = window.GAME_CONFIG || {
                terrain: { levels: [
                    { id: 'mountains', name: '山脉标注', score: { correct: 10, wrong: -5, hint: -3 }, timeLimit: 300 },
                    { id: 'terrain-regions', name: '地形区标注', score: { correct: 10, wrong: -5, hint: -3 }, timeLimit: 300 }
                ]},
                stars: { '3': { maxTime: 120, maxErrors: 2 }, '2': { maxTime: 240, maxErrors: 5 } },
                pk: { turnTimeLimit: 20, switchOnWrong: true }
            };

            bindModeSwitch();
            if (isEditor) {
                enterEditorMode();
            } else {
                enterGameMode();
            }
        }

        function syncOverlayContainer() {
            const container = els.mapContainer;
            const overlayContainer = els.overlayContainer;
            const handleContainer = els.handleContainer;
            const containerRect = container.getBoundingClientRect();

            // 以 base-map-img 的 object-fit:contain 实际可见区域为锚点
            // 无论是否有画布 padding，底图可见区域都是叠加图的唯一参照
            const baseImg = document.getElementById('baseMapImg');
            const imgRect = baseImg.getBoundingClientRect();
            const imgAspect = MAP_CONFIG.baseWidth / MAP_CONFIG.baseHeight;
            const elAspect = imgRect.width / imgRect.height;
            let visX, visY, visW, visH;
            if (elAspect > imgAspect) {
                visH = imgRect.height;
                visW = imgRect.height * imgAspect;
                visX = imgRect.x + (imgRect.width - visW) / 2;
                visY = imgRect.y;
            } else {
                visW = imgRect.width;
                visH = imgRect.width / imgAspect;
                visX = imgRect.x;
                visY = imgRect.y + (imgRect.height - visH) / 2;
            }

            const left = (visX - containerRect.left) + 'px';
            const top = (visY - containerRect.top) + 'px';
            const width = visW + 'px';
            const height = visH + 'px';

            overlayContainer.style.position = 'absolute';
            overlayContainer.style.inset = '';
            overlayContainer.style.left = left;
            overlayContainer.style.top = top;
            overlayContainer.style.width = width;
            overlayContainer.style.height = height;
            if (handleContainer) {
                handleContainer.style.position = 'absolute';
                handleContainer.style.inset = '';
                handleContainer.style.left = left;
                handleContainer.style.top = top;
                handleContainer.style.width = width;
                handleContainer.style.height = height;
            }
        }

        /**
         * 校准模式画布扩展：扩大容器 padding 创造出空白操作区域，
         * 但保持底图、overlay、SVG 的显示大小不变。
         */
        function setCalibrationCanvas(expanded) {
            const padding = 80;
            const container = els.mapContainer;
            const baseMap = document.getElementById('baseMapImg');
            const overlay = els.overlayContainer;
            const svg = els.mapSvg;
            const handleContainer = els.handleContainer;

            if (expanded) {
                // 如果已经扩展过（如 resize 时），先恢复原始状态再重新计算，避免尺寸累积
                if (state._calibrationStyles) {
                    const s = state._calibrationStyles;
                    Object.assign(container.style, s.container);
                    Object.assign(baseMap.style, s.baseMap);
                    Object.assign(overlay.style, s.overlay);
                    Object.assign(svg.style, s.svg);
                    delete state._calibrationStyles;
                }

                // 保存当前原始样式
                state._calibrationStyles = {
                    container: {
                        padding: container.style.padding,
                        width: container.style.width,
                        height: container.style.height,
                        flex: container.style.flex
                    },
                    baseMap: {
                        inset: baseMap.style.inset,
                        width: baseMap.style.width,
                        height: baseMap.style.height
                    },
                    svg: {
                        inset: svg.style.inset,
                        width: svg.style.width,
                        height: svg.style.height
                    }
                };

                // 获取原始 content-box 尺寸（当前尚未加 padding）
                const rect = container.getBoundingClientRect();
                const originalWidth = rect.width;
                const originalHeight = rect.height;

                container.style.padding = padding + 'px';
                container.style.width = (originalWidth + padding * 2) + 'px';
                container.style.height = (originalHeight + padding * 2) + 'px';
                container.style.flex = 'none';

                // 子元素使用固定像素尺寸，保持与原始大小完全一致
                // overlayContainer/handleContainer 由 syncOverlayContainer() 统一管理定位
                const inset = padding + 'px';
                [baseMap, svg].forEach(el => {
                    el.style.inset = inset;
                    el.style.width = originalWidth + 'px';
                    el.style.height = originalHeight + 'px';
                });
            } else {
                const s = state._calibrationStyles;
                if (!s) return;
                Object.assign(container.style, s.container);
                Object.assign(baseMap.style, s.baseMap);
                Object.assign(svg.style, s.svg);
                delete state._calibrationStyles;
            }

            syncOverlayContainer();
            if (state.overlayEngine) state.overlayEngine.renderOverlays();
        }

        function loadOverlayCalibration() {
            let data = null;
            if (window.OVERLAY_CALIBRATION) {
                data = window.OVERLAY_CALIBRATION;
            }
            if (!data) {
                try {
                    const stored = localStorage.getItem('terrain-overlay-calibration');
                    if (stored) data = JSON.parse(stored);
                } catch (e) { /* ignore */ }
            }
            state.overlayEngine.loadOverlays(data);

            els.modeSwitch.querySelectorAll('button').forEach(btn => {

                    const urlParams = new URLSearchParams(location.search);
                    const isEditor = urlParams.has('editor');

                        if (!isEditor) {
                            location.search = '?editor=1';
                        }
                        return;
                    }

                    // 从编辑器模式切回游戏模式需要刷新页面

                    els.modeSwitch.querySelectorAll('button').forEach(b => b.classList.remove('active'));

            const levelConfig = state.gameConfig.terrain.levels.find(l => l.id === levelId);
            els.levelName.textContent = levelConfig ? levelConfig.name : (levelId === 'mountains' ? '山脉标注' : '地形区标注');

            // 根据关卡动态显示对应开关，并重置所有动态图层为关闭

            // 重置叠加图片开关和可见性
            const overlayMountainToggle = document.querySelector('.layer-toggle[data-layer="overlayMountain"] input');
            const overlayRegionToggle = document.querySelector('.layer-toggle[data-layer="overlayRegion"] input');
            if (overlayMountainToggle) overlayMountainToggle.checked = false;
            if (overlayRegionToggle) overlayRegionToggle.checked = false;
            state.overlayEngine.setVisible('mountainBlank', false);
            state.overlayEngine.setVisible('terrainRegion', false);

            // 重置状态
            state.placedIds.clear();

        // ============================================================
        // 数据管理器：纯前端，从全局 JS 变量读取（兼容 file:// 协议）
        // ============================================================

        const dataManager = {
            /** 加载指定关卡的数据，返回深拷贝。从所有数据源中按 targetLevel 过滤 */
            load(levelId) {
                const allData = [];
                const mountains = window.GEO_DATA?.mountains || [];
                const lines = window.GEO_DATA?.lines || [];
                const regions = window.GEO_DATA?.regions || [];

                mountains.forEach(d => {
                    const copy = JSON.parse(JSON.stringify(d));
                    if (!copy.targetLevel) copy.targetLevel = 'mountains';
                    allData.push(copy);
                });
                lines.forEach(d => {
                    const copy = JSON.parse(JSON.stringify(d));
                    if (!copy.targetLevel) copy.targetLevel = 'mountains';
                    allData.push(copy);
                });
                regions.forEach(d => {
                    const copy = JSON.parse(JSON.stringify(d));
                    if (!copy.targetLevel) copy.targetLevel = 'terrain-regions';
                    allData.push(copy);
                });

                return allData.filter(d => d.targetLevel === levelId);
            }
        };

        /** 从全局 JS 数据文件加载采集数据到编辑器 */
        function loadEditorStorage() {
            const mountains = window.GEO_DATA?.mountains || [];
            const lines = window.GEO_DATA?.lines || [];
            const regions = window.GEO_DATA?.regions || [];
            state.editorItems = [
                ...mountains.map(d => {
                    const data = JSON.parse(JSON.stringify(d));
                    if (!data.targetLevel) data.targetLevel = 'mountains';
                    return { type: 'mountain', data };
                }),
                ...lines.map(d => {
                    const data = JSON.parse(JSON.stringify(d));
                    if (!data.targetLevel) data.targetLevel = 'mountains';
                    return { type: 'line', data };
                }),
                ...regions.map(d => {
                    const data = JSON.parse(JSON.stringify(d));
                    if (!data.targetLevel) data.targetLevel = 'terrain-regions';
                    return { type: 'region', data };
                })
            ];
            console.log('[loadEditorStorage] loaded', state.editorItems.length, 'items');
        }

        function startGame() {
            if (state.items.length === 0) {
                showToast('暂无采集数据，请先进入“坐标采集”模块添加数据后再挑战', 'info', 3000);
                return;
            }
            state.isPlaying = true;
            els.startOverlay.style.display = 'none';
            els.sidebar.style.display = '';

            if (state.pk.active) {
                startPkGame();
            } else {
                state.timerInterval = setInterval(() => {
                    state.timer++;
                    els.timerDisplay.textContent = formatTime(state.timer);
                }, 1000);
            }
            setupDragAndDrop();
            updateUI();
        }

        function startPkGame() {
            resetPkState();
            state.pk.totalInterval = setInterval(() => {
                state.pk.totalTimer++;
            }, 1000);
            startPkTurn();
        }

        function startPkTurn() {
            state.pk.turnTime = state.gameConfig.pk.turnTimeLimit;
            updatePkUI();
            clearInterval(state.pk.turnInterval);
            state.pk.turnInterval = setInterval(() => {
                state.pk.turnTime--;
                document.getElementById('pkTurnTimer').textContent = state.pk.turnTime;
                if (state.pk.turnTime <= 0) {
                    showToast(`玩家${state.pk.currentPlayer}超时！切换回合`, 'info');
                    switchTurn();
                }
            }, 1000);

        function switchTurn() {
            state.pk.currentPlayer = state.pk.currentPlayer === 1 ? 2 : 1;
            startPkTurn();
        }

        function updatePkUI() {
            document.getElementById('pkScore1').textContent = state.pk.scores[0];
            document.getElementById('pkScore2').textContent = state.pk.scores[1];
            document.getElementById('pkTurnTimer').textContent = state.pk.turnTime;
            const p1 = document.getElementById('pkP1');
            const p2 = document.getElementById('pkP2');

        function restartGame() {

            setupLevel(state.level);

        function stopGame() {
            state.isPlaying = false;
            clearInterval(state.timerInterval);
            clearInterval(state.pk.turnInterval);
            clearInterval(state.pk.totalInterval);
            if (state.dragEl) {
                state.dragEl.remove();
                state.dragEl = null;
            }
            state.draggedItem = null;
        }

        function endGame() {
            stopGame();
            if (state.pk.active) {
                showPkResult();
            } else {
                const stars = calculateStars(state.timer, state.wrongCount);
                showResult(stars);
            }

        function calculateStars(time, errors) {
            const cfg = state.gameConfig.stars;
            if (time <= cfg['3'].maxTime && errors <= cfg['3'].maxErrors) return 3;
            if (time <= cfg['2'].maxTime && errors <= cfg['2'].maxErrors) return 2;
            return 1;
        }

        // ============================================================
        // 拖拽交互（Pointer Events，支持鼠标和触摸）
        // ============================================================

        function setupDragAndDrop() {
            // 事件委托到 labelList
            els.labelList.addEventListener('pointerdown', onPointerDown);
        }

        function onPointerDown(e) {
            if (!state.isPlaying && state.mode !== 'editor') return;
            const label = e.target.closest('.drag-label');
            if (!label || label.classList.contains('placed')) return;

            e.preventDefault();
            const itemId = label.dataset.id;
            const item = state.items.find(i => i.id === itemId);
            if (!item) return;

            state.draggedItem = item;
            label.classList.add('dragging');

            // 创建浮动拖拽元素
            const rect = label.getBoundingClientRect();
            const dragEl = document.createElement('div');
            dragEl.className = 'drag-label dragging';
            dragEl.textContent = label.dataset.name;
            dragEl.style.position = 'fixed';
            dragEl.style.left = rect.left + 'px';
            dragEl.style.top = rect.top + 'px';
            dragEl.style.width = rect.width + 'px';
            dragEl.style.zIndex = 2000;
            dragEl.style.pointerEvents = 'none';
            dragEl.style.boxShadow = '0 6px 20px rgba(0,0,0,0.25)';
            document.body.appendChild(dragEl);
            state.dragEl = dragEl;

            // 记录偏移
            const offsetX = e.clientX - rect.left;
            const offsetY = e.clientY - rect.top;

            function onMove(ev) {
                dragEl.style.left = (ev.clientX - offsetX) + 'px';
                dragEl.style.top = (ev.clientY - offsetY) + 'px';
            }

            function onUp(ev) {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
                label.classList.remove('dragging');
                dragEl.remove();
                state.dragEl = null;

                handleDrop(ev.clientX, ev.clientY, item, label);
            }

            document.addEventListener('pointermove', onMove);
            document.addEventListener('pointerup', onUp);
        }

        function handleDrop(clientX, clientY, item, labelEl) {
            // 判断落点是否在地图容器内
            const containerRect = els.mapContainer.getBoundingClientRect();
            if (
                clientX < containerRect.left || clientX > containerRect.right ||
                clientY < containerRect.top || clientY > containerRect.bottom
            ) {
                // 未拖到地图内，视为取消
                return;
            }

            // 转换为 SVG 坐标
            const svgPos = state.mapEngine.screenToSvg(clientX, clientY);
            const dropRadius = item.dropRadius || 50;

            // 计算释放位置与目标的最短距离
            let dist = Infinity;
            let targetPos = null;

            if (item.point) {
                targetPos = item.point;
                const dx = svgPos.x - targetPos.x;
                const dy = svgPos.y - targetPos.y;
                dist = Math.sqrt(dx * dx + dy * dy);
            } else if (item.center) {
                targetPos = item.center;
                const dx = svgPos.x - targetPos.x;
                const dy = svgPos.y - targetPos.y;
                dist = Math.sqrt(dx * dx + dy * dy);
            } else if (item.points && item.points.length) {
                // 线型：计算到所有顶点和线段的最短距离
                for (let i = 0; i < item.points.length; i++) {
                    const p = item.points[i];
                    const d = Math.sqrt((svgPos.x - p.x) ** 2 + (svgPos.y - p.y) ** 2);
                    if (d < dist) {
                        dist = d;
                        targetPos = p;
                    }
                }
                for (let i = 0; i < item.points.length - 1; i++) {
                    const d = pointToSegmentDist(svgPos.x, svgPos.y, item.points[i], item.points[i + 1]);
                    if (d < dist) {
                        dist = d;
                        targetPos = item.points[i]; // 落点吸附到线段起点附近（简化处理）
                    }
                }
            }

            if (!targetPos) return;

            if (dist <= dropRadius) {
                // 正确放置
                handleCorrect(item, labelEl, targetPos);
            } else {
                // 错误放置
                handleWrong(labelEl);
            }
        }

        function handleCorrect(item, labelEl, targetPos) {
            if (state.mode === 'editor') {
                // 采集模式：仅做视觉反馈，方便验证坐标精度，不计分
                labelEl.classList.add('placed');
                labelEl.classList.remove('dragging');
                state.mapEngine.setItemVisible(item.id, true);

                const ctm = els.mapSvg.getScreenCTM();
                const svgPt = els.mapSvg.createSVGPoint();
                svgPt.x = targetPos.x;
                svgPt.y = targetPos.y;
                const screenPt = svgPt.matrixTransform(ctm);

                const flyEl = document.createElement('div');
                flyEl.className = 'drag-label placed pulse-success';
                flyEl.textContent = item.name;
                flyEl.style.position = 'fixed';
                const labelRect = labelEl.getBoundingClientRect();
                flyEl.style.left = labelRect.left + 'px';
                flyEl.style.top = labelRect.top + 'px';
                flyEl.style.width = labelRect.width + 'px';
                flyEl.style.zIndex = 1500;
                flyEl.style.transition = 'all 0.5s cubic-bezier(0.2, 1, 0.3, 1)';
                document.body.appendChild(flyEl);
                requestAnimationFrame(() => {
                    flyEl.style.left = screenPt.x + 'px';
                    flyEl.style.top = screenPt.y + 'px';
                    flyEl.style.transform = 'scale(0.8)';
                    flyEl.style.opacity = '0';
                });
                setTimeout(() => flyEl.remove(), 500);

                showFeedbackBadge(screenPt.x, screenPt.y, '正确', 'correct');
                showToast('放置正确', 'success');

                // 2秒后重置标签状态，方便反复测试
                setTimeout(() => {
                    labelEl.classList.remove('placed');
                }, 2000);
                return;
            }

            state.placedIds.add(item.id);
            state.correctCount++;
            const scoreCfg = state.gameConfig.terrain.levels.find(l => l.id === state.level).score;

            if (state.pk.active) {
                // PK 模式：当前玩家得分，记录归属
                const pIdx = state.pk.currentPlayer - 1;
                state.pk.scores[pIdx] += scoreCfg.correct;
                state.pk.placedBy[item.id] = state.pk.currentPlayer;
                updatePkUI();
            } else {
                state.score += scoreCfg.correct;
            }

            // 标签变为已放置状态
            labelEl.classList.add('placed');
            labelEl.classList.remove('dragging');

            // 显示地图标记，并固定答案到独立图层
            state.mapEngine.setItemVisible(item.id, true);
            state.mapEngine.addAnswerMarker(item);

            // 动画：标签飞到地图上的目标位置（屏幕坐标）
            // 使用 SVG 的 CTM 矩阵将 SVG 内部坐标精确转换为屏幕坐标
            const ctm = els.mapSvg.getScreenCTM();
            const svgPt = els.mapSvg.createSVGPoint();
            svgPt.x = targetPos.x;
            svgPt.y = targetPos.y;
            const screenPt = svgPt.matrixTransform(ctm);
            const targetScreenX = screenPt.x;
            const targetScreenY = screenPt.y;

            const flyEl = document.createElement('div');
            flyEl.className = 'drag-label placed pulse-success';
            flyEl.textContent = item.name;
            flyEl.style.position = 'fixed';
            const labelRect = labelEl.getBoundingClientRect();
            flyEl.style.left = labelRect.left + 'px';
            flyEl.style.top = labelRect.top + 'px';
            flyEl.style.width = labelRect.width + 'px';
            flyEl.style.zIndex = 1500;
            flyEl.style.transition = 'all 0.5s cubic-bezier(0.2, 1, 0.3, 1)';
            document.body.appendChild(flyEl);

            requestAnimationFrame(() => {
                flyEl.style.left = targetScreenX + 'px';
                flyEl.style.top = targetScreenY + 'px';
                flyEl.style.transform = 'scale(0.8)';
                flyEl.style.opacity = '0';
            });

            setTimeout(() => flyEl.remove(), 500);

            // 浮动反馈
            showFeedbackBadge(targetScreenX, targetScreenY, '+10', 'correct');
            if (state.pk.active) {
                showToast(`玩家${state.pk.currentPlayer}答对了！+${scoreCfg.correct}，继续答题`, 'success');
            } else {
                showToast('答对了！+' + scoreCfg.correct, 'success');
                updateUI();
            }

            updateCounts();

            // 检查是否全部完成
            if (state.placedIds.size >= state.items.length) {
                setTimeout(endGame, 800);
            }
        }

        function handleWrong(labelEl) {
            if (state.mode === 'editor') {
                labelEl.classList.add('shake');
                setTimeout(() => labelEl.classList.remove('shake'), 400);
                showToast('位置不对，再试一次', 'error');
                return;
            }

            state.wrongCount++;

            // 标签抖动
            labelEl.classList.add('shake');
            setTimeout(() => labelEl.classList.remove('shake'), 400);

            const rect = labelEl.getBoundingClientRect();

            if (state.pk.active) {
                showFeedbackBadge(rect.left + rect.width / 2, rect.top, '换对手！', 'wrong');
                showToast(`玩家${state.pk.currentPlayer}答错，换对手！`, 'error');
                switchTurn();
            } else {
                const scoreCfg = state.gameConfig.terrain.levels.find(l => l.id === state.level).score;
                state.score = Math.max(0, state.score + scoreCfg.wrong);
                showFeedbackBadge(rect.left + rect.width / 2, rect.top, scoreCfg.wrong + '', 'wrong');
                showToast('位置不对，再试一次', 'error');
                updateUI();
            }
        }

        function showFeedbackBadge(x, y, text, type) {
            const badge = document.createElement('div');
            badge.className = 'feedback-badge ' + type;
            badge.textContent = text;
            badge.style.left = x + 'px';
            badge.style.top = y + 'px';
            document.body.appendChild(badge);
            setTimeout(() => badge.remove(), 1000);
        }

        // ============================================================
        // 提示功能
        // ============================================================

        function useHint() {
            if (!state.isPlaying || state.hintsUsed >= state.hintsMax) return;

            // 按顺序找到一个未放置的项
            const unplaced = state.items.find(i => !state.placedIds.has(i.id));
            if (!unplaced) return;

            state.hintsUsed++;
            const scoreCfg = state.gameConfig.terrain.levels.find(l => l.id === state.level).score;
            state.score = Math.max(0, state.score + scoreCfg.hint);

            // 高亮目标区域 3 秒（兼容点、连续线、范围三种方式）
            const dropZone = els.mapSvg.querySelector(`.drop-zone[data-id="${unplaced.id}"]`);
            if (dropZone) {
                const dzLayer = state.mapEngine.layers.dropZones;
                const dzLayerHidden = dzLayer.style.display === 'none';
                if (dzLayerHidden) dzLayer.style.display = '';
                dropZone.style.display = '';
                dropZone.classList.add('visible');
                setTimeout(() => {
                    dropZone.classList.remove('visible');
                    if (dzLayerHidden) dzLayer.style.display = 'none';
                }, 3000);
            } else if (unplaced.points) {
                const lineLayer = state.mapEngine.layers.lines;
                const lineLayerHidden = lineLayer.style.display === 'none';
                if (lineLayerHidden) lineLayer.style.display = '';

                const lineItem = els.mapSvg.querySelector(`.line-item[data-id="${unplaced.id}"]`);
                if (lineItem) {
                    lineItem.style.display = '';
                    const polyline = lineItem.querySelector('.line-polyline');
                    if (polyline) {
                        polyline.classList.add('hint-highlight');
                        setTimeout(() => {
                            polyline.classList.remove('hint-highlight');
                            if (lineLayerHidden) lineLayer.style.display = 'none';
                        }, 3000);
                    } else if (lineLayerHidden) {
                        setTimeout(() => lineLayer.style.display = 'none', 3000);
                    }
                }
            } else if (unplaced.boundary || unplaced.center) {
                const regionLayer = state.mapEngine.layers.regions;
                const regionLayerHidden = regionLayer.style.display === 'none';
                if (regionLayerHidden) regionLayer.style.display = '';

                const regionItem = els.mapSvg.querySelector(`.region-item[data-id="${unplaced.id}"]`);
                if (regionItem) {
                    regionItem.style.display = '';
                    const boundary = regionItem.querySelector('.region-boundary');
                    if (boundary) {
                        boundary.classList.add('hint-highlight');
                        setTimeout(() => {
                            boundary.classList.remove('hint-highlight');
                            if (regionLayerHidden) regionLayer.style.display = 'none';
                        }, 3000);
                    } else if (regionLayerHidden) {
                        setTimeout(() => regionLayer.style.display = 'none', 3000);
                    }
                }
            }

            // 左侧待标注栏同步高亮对应标签
            const labelEl = document.querySelector(`.drag-label[data-id="${unplaced.id}"]`);
            if (labelEl) {
                labelEl.classList.add('label-hint-highlight');
                setTimeout(() => labelEl.classList.remove('label-hint-highlight'), 3000);
            }

            showToast('已提示一个目标位置 -' + Math.abs(scoreCfg.hint) + '分', 'info');
            updateUI();
        }

                    } else {

        function bindEditorEvents() {
            const editorType = document.getElementById('editorType');
            const editorName = document.getElementById('editorName');
            const editorDesc = document.getElementById('editorDesc');
            const editorCoords = document.getElementById('editorCoords');
            const editorAddBtn = document.getElementById('editorAddBtn');
            const editorFinishBoundaryBtn = document.getElementById('editorFinishBoundaryBtn');
            const editorFinishLineBtn = document.getElementById('editorFinishLineBtn');
            const editorExportBtn = document.getElementById('editorExportBtn');
            const editorTestBtn = document.getElementById('editorTestBtn');
            const editorUndoBtn = document.getElementById('editorUndoBtn');
            const editorClearBtn = document.getElementById('editorClearBtn');
            const editorList = document.getElementById('editorList');

            // 点击地图采集坐标（点击空白处添加，点击已有采集点/预览标记删除）
            els.mapSvg.addEventListener('pointerdown', (e) => {
                if (state.mode !== 'editor') return;
                if (state.editorTab === 'calibrate') return;
                const pos = state.mapEngine.screenToSvg(e.clientX, e.clientY);
                const clickThreshold = 25;
                const type = editorType.value;

                // 1. 先检查是否点击了已保存的采集点、边界点或线型
                const clicked = findEditorItemAt(pos.x, pos.y, clickThreshold);
                if (clicked) {
                    pushUndo();
                    deleteEditorItem(clicked);
                    return;
                }

                // 2. 检查是否点击了尚未保存的预览标记（单点/边界点）
                const previewRemoved = removePreviewMarkerAt(pos.x, pos.y, clickThreshold);
                if (previewRemoved) {
                    const coordVal = document.getElementById('editorCoords').value;
                    const previewPos = parseCoords(coordVal);
                    if (previewPos) {
                        const dist = Math.sqrt((pos.x - previewPos.x) ** 2 + (pos.y - previewPos.y) ** 2);
                        if (dist <= clickThreshold) {
                            document.getElementById('editorCoords').value = '';
                        }
                    }
                    showToast('已取消预览标记', 'info');
                    return;
                }

                // 3. 线型模式：检查是否点击了预览顶点
                if (type === 'line') {
                    const removedIdx = removePreviewLineVertexAt(pos.x, pos.y, clickThreshold);
                    if (removedIdx >= 0) {
                        state.editorLinePoints.splice(removedIdx, 1);
                        refreshLinePreview();
                        editorCoords.value = state.editorLinePoints.map(p => `${p.x},${p.y}`).join(' | ');
                        if (state.editorLinePoints.length < 2) editorFinishLineBtn.style.display = 'none';
                        showToast('已删除线型顶点', 'info');
                        return;
                    }
                }

                // 4. 添加新点（压入撤销栈后修改预览状态）
                editorCoords.value = `${Math.round(pos.x)}, ${Math.round(pos.y)}`;
                const radius = parseInt(document.getElementById('editorRadius').value) || (type === 'mountain' ? 50 : 80);

                if (type === 'mountain' || type === 'region-center') {
                    pushUndo();
                    state.mapEngine.addEditorMarker(pos.x, pos.y, editorName.value || '未命名');
                    state.mapEngine.addEditorDropZone(pos.x, pos.y, radius, 'R=' + radius);
                } else if (type === 'region-boundary') {
                    pushUndo();
                    state.editorBoundaryPoints.push({ x: Math.round(pos.x), y: Math.round(pos.y) });
                    state.mapEngine.addEditorMarker(pos.x, pos.y, 'B' + state.editorBoundaryPoints.length);
                    editorCoords.value = state.editorBoundaryPoints.map(p => `${p.x},${p.y}`).join(' | ');
                    editorFinishBoundaryBtn.style.display = '';
                } else if (type === 'line') {
                    pushUndo();
                    state.editorLinePoints.push({ x: Math.round(pos.x), y: Math.round(pos.y) });
                    refreshLinePreview();
                    editorCoords.value = state.editorLinePoints.map(p => `${p.x},${p.y}`).join(' | ');
                    if (state.editorLinePoints.length >= 2) editorFinishLineBtn.style.display = '';
                }
            });

            // 类型切换
            editorType.addEventListener('change', () => {
                state.editorCurrentType = editorType.value;
                state.editorBoundaryPoints = [];
                state.editorLinePoints = [];
                editorCoords.value = '';
                editorFinishBoundaryBtn.style.display =
                    editorType.value === 'region-boundary' ? '' : 'none';
                editorFinishLineBtn.style.display =
                    editorType.value === 'line' ? '' : 'none';
                // 根据类型设置默认范围半径，并控制半径输入框显隐
                const editorRadiusRow = document.getElementById('editorRadiusRow');
                if (editorType.value === 'line' || editorType.value === 'region-boundary') {
                    editorRadiusRow.style.display = 'none';
                } else {
                    editorRadiusRow.style.display = '';
                    document.getElementById('editorRadius').value =
                        editorType.value === 'mountain' ? 50 : 80;
                }
                cancelEditorEdit();
                refreshEditorVisuals(); // 清除线型预览
            });

            // 添加/更新按钮
            editorAddBtn.addEventListener('click', () => {
                const type = editorType.value;
                const name = editorName.value.trim();
                if (!name) {
                    alert('请输入名称');
                    return;
                }

                const item = {
                    id: pinyinId(name),
                    name: name,
                    description: editorDesc.value.trim(),
                    targetLevel: document.getElementById('editorTargetLevel').value
                };
                const radius = parseInt(document.getElementById('editorRadius').value) || (type === 'mountain' ? 50 : 80);

                pushUndo();
                if (type === 'mountain') {
                    const coords = parseCoords(editorCoords.value);
                    if (!coords) return alert('请先点击地图采集坐标');
                    item.point = coords;
                    item.dropRadius = radius;
                    item.labelPosition = { x: coords.x, y: coords.y - 20 };
                    saveEditorItem('mountain', item);
                } else if (type === 'region-center') {
                    const coords = parseCoords(editorCoords.value);
                    if (!coords) return alert('请先点击地图采集坐标');
                    item.center = coords;
                    item.dropRadius = radius;
                    item.labelPosition = { x: coords.x, y: coords.y };
                    item.boundary = [];
                    saveEditorItem('region', item);
                } else if (type === 'region-boundary') {
                    if (state.editorBoundaryPoints.length < 3) {
                        return alert('边界至少需要3个点');
                    }
                    item.boundary = [...state.editorBoundaryPoints];
                    item.center = calcCentroid(state.editorBoundaryPoints);
                    item.dropRadius = radius;
                    item.labelPosition = { x: item.center.x, y: item.center.y };
                    saveEditorItem('region', item);
                    state.editorBoundaryPoints = [];
                    editorFinishBoundaryBtn.style.display = 'none';
                } else if (type === 'line') {
                    if (state.editorLinePoints.length < 2) {
                        return alert('线型至少需要2个点');
                    }
                    item.points = [...state.editorLinePoints];
                    item.dropRadius = radius;
                    item.labelPosition = { x: item.points[0].x, y: item.points[0].y - 20 };
                    saveEditorItem('line', item);
                    state.editorLinePoints = [];
                    editorFinishLineBtn.style.display = 'none';
                }

                editorName.value = '';
                editorDesc.value = '';
                editorCoords.value = '';
                cancelEditorEdit();
                renderEditorList();
                syncEditorToSidebar();
                refreshEditorVisuals();
            });

            // 完成边界按钮
            editorFinishBoundaryBtn.addEventListener('click', () => {
                editorAddBtn.click();
            });

            // 完成线型按钮
            editorFinishLineBtn.addEventListener('click', () => {
                editorAddBtn.click();
            });

            // 撤销按钮
            editorUndoBtn.addEventListener('click', () => {
                undo();
            });

            // 清空全部
            editorClearBtn.addEventListener('click', () => {
                if (!confirm('确定清空所有采集点吗？')) return;
                pushUndo();
                state.editorItems = [];
                state.editorBoundaryPoints = [];
                state.editorLinePoints = [];
                state.mapEngine.clearEditorMarkers();
                saveEditorStorage();
                cancelEditorEdit();
                renderEditorList();
                syncEditorToSidebar();
            });

            // 导出 JS 数据文件（兼容 file:// 协议，替换 data/ 目录下原文件即可）
            editorExportBtn.addEventListener('click', () => {
                const mountains = state.editorItems
                    .filter(i => i.type === 'mountain')
                    .map(i => i.data);
                const lines = state.editorItems
                    .filter(i => i.type === 'line')
                    .map(i => i.data);
                const regions = state.editorItems
                    .filter(i => i.type === 'region')
                    .map(i => i.data);

                let exported = false;
                if (mountains.length) {
                    exportJSData(mountains, 'mountains.js', 'mountains');
                    exported = true;
                }
                if (lines.length) {
                    exportJSData(lines, 'lines.js', 'lines');
                    exported = true;
                }
                if (regions.length) {
                    exportJSData(regions, 'terrain-regions.js', 'regions');
                    exported = true;
                }

                if (!exported) {
                    alert('没有数据可导出');
                } else {
                    showToast('JS 数据文件已导出到下载目录，请覆盖到项目 data/ 文件夹下', 'success', 4000);
                }
            });
        }

        /**
         * 计算点 (px,py) 到线段 AB 的最短距离
         */
        function pointToSegmentDist(px, py, a, b) {
            const dx = b.x - a.x, dy = b.y - a.y;
            if (dx === 0 && dy === 0) return Math.sqrt((px - a.x) ** 2 + (py - a.y) ** 2);
            let t = ((px - a.x) * dx + (py - a.y) * dy) / (dx * dx + dy * dy);
            t = Math.max(0, Math.min(1, t));
            const nx = a.x + t * dx, ny = a.y + t * dy;
            return Math.sqrt((px - nx) ** 2 + (py - ny) ** 2);
        }

        /**
         * 删除线型预览中的某个顶点（点击 editor-layer 上的预览顶点时触发）
         * @returns {number} 删除的顶点索引，未找到返回 -1
         */
        function removePreviewLineVertexAt(x, y, threshold) {
            const editorLayer = state.mapEngine.layers.editor;
            const vertices = Array.from(editorLayer.querySelectorAll('.editor-polyline-vertex'));
            for (let i = 0; i < vertices.length; i++) {
                const cx = parseFloat(vertices[i].getAttribute('cx'));
                const cy = parseFloat(vertices[i].getAttribute('cy'));
                const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
                if (dist <= threshold) return i;
            }
            return -1;
        }

        /**
         * 根据当前 editorLinePoints 重新绘制线型预览
         */
        function refreshLinePreview() {
            const editorLayer = state.mapEngine.layers.editor;
            editorLayer.querySelectorAll('.editor-polyline-group').forEach(g => g.remove());
            if (state.editorLinePoints.length >= 1) {
                state.mapEngine.addEditorPolyline(state.editorLinePoints, editorName.value || '未命名');
            }
        }

        // ============================================================
        // 撤销栈
        // ============================================================

        /**
         * 压入撤销栈（在修改 editorItems 或预览点前调用）
         * 快照同时保存 editorItems、线型预览点、边界预览点
         */
        function pushUndo() {
            const snapshot = {
                items: JSON.parse(JSON.stringify(state.editorItems)),
                linePoints: JSON.parse(JSON.stringify(state.editorLinePoints)),
                boundaryPoints: JSON.parse(JSON.stringify(state.editorBoundaryPoints))
            };
            state.undoStack.push(snapshot);
            if (state.undoStack.length > 50) state.undoStack.shift(); // 限制栈深度
        }

        /**
         * 撤销上一步操作
         * 恢复到栈顶快照的 editorItems 和预览点状态
         */
        function undo() {
            if (state.undoStack.length === 0) {
                showToast('没有可撤销的操作', 'info');
                return;
            }
            const snapshot = state.undoStack.pop();
            state.editorItems = snapshot.items;
            state.editorLinePoints = snapshot.linePoints || [];
            state.editorBoundaryPoints = snapshot.boundaryPoints || [];
            state.editorEditingIdx = -1;
            saveEditorStorage();
            refreshEditorVisuals();
            refreshLinePreview();
            renderEditorList();
            syncEditorToSidebar();
            cancelEditorEdit();

            // 恢复预览 UI 状态
            const editorFinishLineBtn = document.getElementById('editorFinishLineBtn');
            const editorFinishBoundaryBtn = document.getElementById('editorFinishBoundaryBtn');
            const editorCoords = document.getElementById('editorCoords');
            if (editorFinishLineBtn) editorFinishLineBtn.style.display = state.editorLinePoints.length >= 2 ? '' : 'none';
            if (editorFinishBoundaryBtn) editorFinishBoundaryBtn.style.display = state.editorBoundaryPoints.length >= 3 ? '' : 'none';
            if (state.editorLinePoints.length && editorCoords) {
                editorCoords.value = state.editorLinePoints.map(p => `${p.x},${p.y}`).join(' | ');
            } else if (state.editorBoundaryPoints.length && editorCoords) {
                editorCoords.value = state.editorBoundaryPoints.map(p => `${p.x},${p.y}`).join(' | ');
            } else if (editorCoords) {
                editorCoords.value = '';
            }

            showToast('已撤销上一步', 'success');
        }

        // 全局快捷键监听
        document.addEventListener('keydown', (e) => {
            if (state.mode !== 'editor') return;
            if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                e.preventDefault();
                undo();
            }
        });

        /**
         * 查找点击位置附近的已有采集点
         * 检测阈值优先使用采集点自身的 dropRadius（范围圈内点击都算命中），
         * 边界点使用固定小阈值避免误触
         * @returns {Object|null} { idx, isBoundary, boundaryIdx, isLineVertex, vertexIdx }
         */
        function findEditorItemAt(x, y, baseThreshold) {
            for (let i = 0; i < state.editorItems.length; i++) {
                const wrapper = state.editorItems[i];
                const d = wrapper.data;
                if (wrapper.type === 'mountain' && d.point) {
                    const dist = Math.sqrt((x - d.point.x) ** 2 + (y - d.point.y) ** 2);
                    const threshold = Math.max(baseThreshold, d.dropRadius || baseThreshold);
                    if (dist <= threshold) return { idx: i };
                } else if (wrapper.type === 'line' && d.points && d.points.length) {
                    // 线型顶点检测
                    for (let j = 0; j < d.points.length; j++) {
                        const p = d.points[j];
                        const dist = Math.sqrt((x - p.x) ** 2 + (y - p.y) ** 2);
                        if (dist <= baseThreshold) return { idx: i, isLineVertex: true, vertexIdx: j };
                    }
                    // 线段检测（点到线段距离）
                    for (let j = 0; j < d.points.length - 1; j++) {
                        const dist = pointToSegmentDist(x, y, d.points[j], d.points[j + 1]);
                        if (dist <= baseThreshold) return { idx: i };
                    }
                } else if (wrapper.type === 'region') {
                    if (d.boundary && d.boundary.length) {
                        for (let j = 0; j < d.boundary.length; j++) {
                            const bp = d.boundary[j];
                            const dist = Math.sqrt((x - bp.x) ** 2 + (y - bp.y) ** 2);
                            if (dist <= baseThreshold) return { idx: i, isBoundary: true, boundaryIdx: j };
                        }
                    }
                    if (d.center) {
                        const dist = Math.sqrt((x - d.center.x) ** 2 + (y - d.center.y) ** 2);
                        const threshold = Math.max(baseThreshold, d.dropRadius || baseThreshold);
                        if (dist <= threshold) return { idx: i };
                    }
                }
            }
            return null;
        }

        /**
         * 删除编辑器中的采集点（点击已有采集点时触发）
         */
        function deleteEditorItem(clicked) {
            const wrapper = state.editorItems[clicked.idx];
            if (!wrapper) return;

            if (wrapper.type === 'line') {
                // 点击线型任意位置（顶点或线段）→ 删除整条线
                state.editorItems.splice(clicked.idx, 1);
            } else if (clicked.isBoundary && wrapper.data.boundary) {
                // 删除单个边界点
                wrapper.data.boundary.splice(clicked.boundaryIdx, 1);
                if (wrapper.data.boundary.length < 3) {
                    // 边界点不足3个，删除整个区域
                    if (!confirm('边界点不足3个，将删除整个地形区，确定吗？')) return;
                    state.editorItems.splice(clicked.idx, 1);
                } else {
                    // 重新计算中心
                    wrapper.data.center = calcCentroid(wrapper.data.boundary);
                }
            } else {
                // 删除整个采集点
                state.editorItems.splice(clicked.idx, 1);
            }

            saveEditorStorage();
            refreshEditorVisuals();
            renderEditorList();
            syncEditorToSidebar();

            // 如果正在编辑被删除的项，取消编辑状态
            if (state.editorEditingIdx === clicked.idx) {
                cancelEditorEdit();
            } else if (state.editorEditingIdx > clicked.idx) {
                state.editorEditingIdx--;
            }

            showToast('已删除采集点', 'success');
        }

        /**
         * 删除尚未保存的预览标记（点击已添加但未保存的标记时触发）
         * @param {number} x - SVG x 坐标
         * @param {number} y - SVG y 坐标
         * @param {number} threshold - 检测阈值（像素）
         * @returns {boolean} 是否成功删除
         */
        function removePreviewMarkerAt(x, y, threshold) {
            const editorLayer = state.mapEngine.layers.editor;
            let removed = false;

            // 先移除匹配的 editor-marker
            editorLayer.querySelectorAll('.editor-marker').forEach(marker => {
                const cx = parseFloat(marker.getAttribute('cx'));
                const cy = parseFloat(marker.getAttribute('cy'));
                const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
                if (dist <= threshold) {
                    marker.closest('g').remove();
                    removed = true;
                }
            });

            // 同时移除同位置的 editor-drop-zone（预览范围圈）
            editorLayer.querySelectorAll('.editor-drop-zone').forEach(dz => {
                const cx = parseFloat(dz.getAttribute('cx'));
                const cy = parseFloat(dz.getAttribute('cy'));
                const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
                if (dist <= threshold) {
                    dz.closest('g').remove();
                }
            });

            return removed;
        }

        /** 保存或更新编辑器项 */
        function saveEditorItem(type, item) {
            if (state.editorEditingIdx >= 0) {
                state.editorItems[state.editorEditingIdx] = { type, data: item };
            } else {
                state.editorItems.push({ type, data: item });
            }
            saveEditorStorage();
        }

        /**
         * 将数据导出为 JS 全局变量格式的文件并触发下载
         * @param {Array} data - 数据数组
         * @param {string} filename - 下载文件名
         * @param {string} globalKey - window.GEO_DATA 下的属性名
         */
        function exportJSData(data, filename, globalKey) {
            const content = `window.GEO_DATA = window.GEO_DATA || {};\nwindow.GEO_DATA.${globalKey} = ${JSON.stringify(data, null, 2)};\n`;
            const blob = new Blob([content], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }

        /** 进入编辑某项的状态 */
        function startEditEditorItem(idx) {
            const wrapper = state.editorItems[idx];
            if (!wrapper) return;
            const d = wrapper.data;
            state.editorEditingIdx = idx;

            const editorType = document.getElementById('editorType');
            const editorName = document.getElementById('editorName');
            const editorDesc = document.getElementById('editorDesc');
            const editorCoords = document.getElementById('editorCoords');
            const editorAddBtn = document.getElementById('editorAddBtn');

            if (wrapper.type === 'mountain') {
                editorType.value = 'mountain';
                editorCoords.value = `${d.point.x}, ${d.point.y}`;
            } else if (wrapper.type === 'line') {
                editorType.value = 'line';
                state.editorLinePoints = [...d.points];
                editorCoords.value = d.points.map(p => `${p.x},${p.y}`).join(' | ');
                document.getElementById('editorFinishLineBtn').style.display = '';
            } else if (wrapper.type === 'region') {
                if (d.boundary && d.boundary.length) {
                    editorType.value = 'region-boundary';
                    state.editorBoundaryPoints = [...d.boundary];
                    editorCoords.value = d.boundary.map(p => `${p.x},${p.y}`).join(' | ');
                    document.getElementById('editorFinishBoundaryBtn').style.display = '';
                } else {
                    editorType.value = 'region-center';
                    editorCoords.value = `${d.center.x}, ${d.center.y}`;
                }
            }
            editorName.value = d.name;
            editorDesc.value = d.description || '';
            document.getElementById('editorTargetLevel').value = d.targetLevel || 'mountains';
            const editorRadiusRow = document.getElementById('editorRadiusRow');
            if (wrapper.type === 'line' || (wrapper.type === 'region' && d.boundary && d.boundary.length)) {
                editorRadiusRow.style.display = 'none';
            } else {
                editorRadiusRow.style.display = '';
                document.getElementById('editorRadius').value = d.dropRadius || (wrapper.type === 'mountain' ? 50 : 80);
            }
            editorAddBtn.textContent = '更新';
        }

        /** 取消编辑状态 */
        function cancelEditorEdit() {
            state.editorEditingIdx = -1;
            document.getElementById('editorAddBtn').textContent = '添加';
        }

        /** 将编辑器采集点加载到游戏中测试 */
        function loadEditorItemsToGame() {
            // 构造可游玩的数据
            const gameItems = state.editorItems.map(w => ({ ...w.data }));
            state.items = gameItems;
            state.placedIds.clear();

            // 清空地图旧标记
            state.mapEngine.layers.mountains.innerHTML = '';
            state.mapEngine.layers.lines.innerHTML = '';
            state.mapEngine.layers.regions.innerHTML = '';
            state.mapEngine.clearDropZones();

            // 按数据字段类型渲染
            gameItems.forEach(item => {
                if (item.point) {
                    state.mapEngine.addMountainMarker(item, showDescription, true);
                    state.mapEngine.addDropZone(item, 'mountain');
                } else if (item.points && item.points.length) {
                    state.mapEngine.addPolyline(item, showDescription, true);
                } else if (item.center || (item.boundary && item.boundary.length)) {
                    state.mapEngine.addRegionBoundary(item, showDescription, true);
                    state.mapEngine.addDropZone(item, 'region');
                }
            });

            // 显示侧边栏并生成标签
            els.sidebar.style.display = '';
            renderLabels();

            // 显示提示
            showToast('已加载 ' + gameItems.length + ' 个采集点到待标注，请拖拽测试', 'success');
        }

        function parseCoords(str) {
            if (!str) return null;
            const parts = str.split(',').map(s => parseFloat(s.trim()));
            if (parts.length >= 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                return { x: parts[0], y: parts[1] };
            }
            return null;
        }

        function calcCentroid(points) {
            let sx = 0, sy = 0;
            points.forEach(p => { sx += p.x; sy += p.y; });
            return { x: Math.round(sx / points.length), y: Math.round(sy / points.length) };
        }

        function pinyinId(name) {
            const map = {
                '大兴安岭': 'daxinganling', '太行山': 'taihangshan', '秦岭': 'qinling',
                '巫山': 'wushan', '雪峰山': 'xuefengshan', '横断山脉': 'hengduan',
                '喜马拉雅山': 'himalaya', '昆仑山': 'kunlunshan', '天山': 'tianshan',
                '祁连山': 'qilianshan', '阴山': 'yinshan', '燕山': 'yanshan',
                '贺兰山': 'helanshan', '南岭': 'nanling', '武夷山': 'wuyishan',
                '长白山': 'changbaishan', '小兴安岭': 'xiaoxinganling', '阿尔泰山': 'altaishan',
                '阿尔金山': 'arjinshan', '冈底斯山': 'gangdisi', '唐古拉山': 'tanggula',

        function renderEditorList() {
            const editorList = document.getElementById('editorList');
            editorList.innerHTML = '';
            state.editorItems.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'editor-point-item';
                const d = item.data;

                if (item.type === 'mountain' && d.point) {
                    coordInfo = `(${d.point.x}, ${d.point.y})`;

                    coordInfo = `(${d.points.length}个点)`;
                } else if (d.center) {
                    coordInfo = `(${d.center.x}, ${d.center.y})`;
                }
                const radiusInfo = d.dropRadius ? ` R=${d.dropRadius}` : '';
                const targetInfo = d.targetLevel ? ` →${d.targetLevel === 'mountains' ? '山脉' : '地形区'}` : '';
                div.innerHTML = `
                    <span>[${item.type}] ${d.name} <small style="color:#999;">${coordInfo}${radiusInfo}${targetInfo}</small></span>

                        <button class="btn-delete" data-idx="${idx}" title="删除">删除</button>
                    </div>

            editorList.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.idx);
                    pushUndo();
                    state.editorItems.splice(idx, 1);
                    saveEditorStorage();
                    refreshEditorVisuals();
                    renderEditorList();
                    syncEditorToSidebar();
                    if (state.editorEditingIdx === idx) cancelEditorEdit();
                    else if (state.editorEditingIdx > idx) state.editorEditingIdx--;
                });

            editorList.querySelectorAll('.btn-edit').forEach(btn => {

        /** 刷新编辑器视觉标记和预览圈 */
        function refreshEditorVisuals() {
            state.mapEngine.clearEditorMarkers();
            state.editorItems.forEach(item => {
                const d = item.data;
                if (item.type === 'mountain' && d.point) {
                    state.mapEngine.addEditorMarker(d.point.x, d.point.y, d.name);
                    state.mapEngine.addEditorDropZone(d.point.x, d.point.y, d.dropRadius || 50, 'R=' + (d.dropRadius || 50));
                } else if (item.type === 'line' && d.points && d.points.length >= 2) {
                    state.mapEngine.addEditorPolyline(d.points, d.name);

                    d.boundary.forEach((p, i) => state.mapEngine.addEditorMarker(p.x, p.y, 'B' + (i + 1)));
                    if (d.center) {
                        state.mapEngine.addEditorMarker(d.center.x, d.center.y, d.name);
                    }
                } else if (item.type === 'region' && d.center) {
                    state.mapEngine.addEditorMarker(d.center.x, d.center.y, d.name);
                    state.mapEngine.addEditorDropZone(d.center.x, d.center.y, d.dropRadius || 80, 'R=' + (d.dropRadius || 80));
