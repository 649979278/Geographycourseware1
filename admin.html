<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>疆域与行政区划 - 地理教学课件</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/game.css">
    <style>
        .placeholder-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 60px);
            gap: 24px;
            text-align: center;
            padding: 40px 20px;
        }
        .placeholder-icon {
            font-size: 80px;
            opacity: 0.6;
        }
        .placeholder-title {
            font-size: 28px;
            color: var(--color-primary);
        }
        .placeholder-desc {
            font-size: 16px;
            color: var(--color-text-secondary);
            max-width: 520px;
            line-height: 1.6;
        }
        .placeholder-features {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 12px;
        }
        .placeholder-features li {
            background: var(--color-surface);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #555;
            list-style: none;
        }
    </style>
</head>
<body class="map-page">
    <a class="home-link" href="index.html">&#8592; 返回首页</a>

    <div class="map-toolbar">
        <span class="toolbar-title">疆域与行政区划</span>
    </div>

    <main class="placeholder-main">
        <div class="placeholder-icon">&#x1F5FA;</div>
        <h2 class="placeholder-title">疆域与行政区划模块</h2>
        <p class="placeholder-desc">
            本模块计划包含34个省级行政区的名称、省会、简称拖拽匹配练习，
            以及疆域四至点、邻国与临海等知识点。敬请期待。
        </p>
        <ul class="placeholder-features">
            <li>省名与轮廓匹配</li>
            <li>省会定位练习</li>
            <li>简称快速记忆</li>
            <li>双人PK对战</li>
        </ul>
        <a href="index.html" class="btn btn-primary" style="margin-top:12px;">返回首页</a>
    </main>
</body>
</html>
