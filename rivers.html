<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>河流和湖泊 - 地理教学课件</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/game.css">
    <style>
        .placeholder-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 60px);
            gap: 24px;
            text-align: center;
            padding: 40px 20px;
        }
        .placeholder-icon {
            font-size: 80px;
            opacity: 0.6;
        }
        .placeholder-title {
            font-size: 28px;
            color: var(--color-primary);
        }
        .placeholder-desc {
            font-size: 16px;
            color: var(--color-text-secondary);
            max-width: 520px;
            line-height: 1.6;
        }
        .placeholder-features {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 12px;
        }
        .placeholder-features li {
            background: var(--color-surface);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #555;
            list-style: none;
        }
    </style>
</head>
<body class="map-page">

    <div class="map-toolbar">
        <a class="home-link" href="index.html">&#8592; 返回首页</a>
        <span class="toolbar-title">河流和湖泊</span>
    </div>

    <main class="placeholder-main">
        <div class="placeholder-icon">&#x1F30A;</div>
        <h2 class="placeholder-title">河流和湖泊模块</h2>
        <p class="placeholder-desc">
            本模块计划包含中国主要河流、湖泊的标注与认知练习，
            涵盖长江、黄河、珠江、塔里木河以及青海湖、鄱阳湖等。敬请期待。
        </p>
        <ul class="placeholder-features">
            <li>主要河流标注</li>
            <li>湖泊位置匹配</li>
            <li>流域地形关联</li>
            <li>双人PK对战</li>
        </ul>
        <a href="index.html" class="btn btn-primary" style="margin-top:12px;">返回首页</a>
    </main>
</body>
</html>
